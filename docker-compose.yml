version: '3'
services:
  garage:
    image: docker.io/dxflrs/garage:v2.2.0
    restart: unless-stopped
    expose:
      - 3900
      - 3901
      - 3902
      - 3903
    volumes:
      - ./conf/garage.toml:/etc/garage.toml
      - ./initlayout.sh:/initlayout.sh:ro
      - garage:/var/lib/garage/meta
      - garage:/var/lib/garage/data
    labels:
      - 'traefik.http.routers.garageapi.rule=Host(`s3.garage.localhost`) || HostRegexp(`^.+.s3.garage.localhost$`)'
      - 'traefik.http.routers.garageapi.service=garageapi-service'
      - 'traefik.http.services.garageapi-service.loadbalancer.server.port=3900'
      - 'traefik.http.routers.garageweb.rule=Host(`web.garage.localhost`) || HostRegexp(`^.+.web.garage.localhost$`)'
      - 'traefik.http.routers.garageweb.service=garageweb-service'
      - 'traefik.http.services.garageweb-service.loadbalancer.server.port=3902'
    post_start:
      - command: ./initlayout.sh
        user: root

  garage-webui:
    image: docker.io/khairul169/garage-webui:latest
    restart: unless-stopped
    expose:
      - 3909
    volumes:
      - ./conf/garage.toml:/etc/garage.toml:ro
    environment:
      API_BASE_URL: 'http://garage:3903'
      S3_ENDPOINT_URL: 'http://garage:3900'
    labels:
      - 'traefik.http.routers.garage-webui.rule=Host(`admin.garage.localhost`)'
  traefik:
    image: docker.io/traefik:v3.6
    command:
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--entrypoints.web.address=:80'
    ports:
      - '8080:80'
      - '8090:8080'
    volumes:
      - /var/run/user/1000/podman/podman.sock:/var/run/docker.sock
  db:
    image: docker.io/postgres:18
    restart: always
    expose:
      - 5432
    environment:
      POSTGRES_PASSWORD: 'thisshouldntmatterbecauseitsnotpubliclyaccessible'
    volumes:
      - pgdata:/var/lib/postgresql
      - postgres-socket:/var/run/postgresql
      - ./initrunner.sh:/docker-entrypoint-initdb.d/initrunner.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 1s
      timeout: 5s
      retries: 10
  migrate:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: .
      target: migrate
    environment:
      - PGHOST=/var/run/postgresql
      - PGUSER=root
      - PGDATABASE=namepending
    volumes:
      - postgres-socket:/var/run/postgresql
    labels:
      - 'traefik.enable=false'
  api:
    depends_on:
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      - PGHOST=/var/run/postgresql
      - PGUSER=root
      - PGDATABASE=namepending
    volumes:
      - postgres-socket:/var/run/postgresql
    labels:
      - 'traefik.http.routers.api.rule=Host(`namepending.localhost`) && PathPrefix(`/api`)'
  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    labels:
      - 'traefik.http.routers.web.rule=Host(`namepending.localhost`)'
volumes:
  garage:
  pgdata:
  postgres-socket:
